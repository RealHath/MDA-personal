name: Sync JSON Schema Files from MaaFramework

on:
  schedule:
    - cron: "10 0 * * *" # UTC 00:10 每天运行

  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-schema-files:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Prettier & plugin
        run: npm install -g prettier prettier-plugin-multiline-arrays

      - name: Download JSON schema files from MaaFramework
        run: |
          echo "Current Date and Time (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')"

          # 确保目标目录存在
          mkdir -p tools/schema

          # 定义要下载的 schema 文件列表
          SCHEMA_FILES=(
            "interface.schema.json"
            "interface_config.schema.json"
            "interface_import.schema.json"
            "pipeline.schema.json"
            "custom.action.schema.json"
            "custom.recognition.schema.json"
          )

          # 下载 JSON schema 文件
          download_failed=false
          for schema_file in "${SCHEMA_FILES[@]}"; do
            url="https://raw.githubusercontent.com/MaaXYZ/MaaFramework/main/tools/${schema_file}"
            output="tools/schema/${schema_file}"

            echo "Downloading ${schema_file}..."
            if curl -sS -f -o "$output" "$url"; then
              echo "  ✓ Downloaded"
            else
              echo "  ✗ Failed to download"
              download_failed=true
            fi
          done

          if [ "$download_failed" = true ]; then
            echo "::warning::Some schema files failed to download"
          fi

          # 使用 prettier 格式化所有 JSON 文件
          echo ""
          echo "Formatting with prettier..."
          prettier --write "tools/schema/*.schema.json" --parser json

          # 检查文件是否成功下载
          echo ""
          echo "Downloaded files:"
          if compgen -G "tools/schema/*.schema.json" > /dev/null; then
            ls -la tools/schema/*.schema.json
          else
            echo "No schema files downloaded"
            exit 1
          fi

      - name: Check for changes with git status
        id: check_status
        run: |
          # 确保 git 能看到未跟踪的文件
          git add -N tools/schema/

          # 检查是否有任何更改（修改、新增、删除）
          if [[ -n "$(git status --porcelain tools/schema/)" ]]; then
            echo "Changes detected in JSON schema files"
            git status --porcelain tools/schema/
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "No changes detected in JSON schema files"
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Build commit message
        id: build_msg
        if: steps.check_status.outputs.changes_detected == 'true'
        run: |
          # 获取变更文件列表（不含路径和后缀）
          changed_files=$(git diff --name-only tools/schema/ | sed 's|tools/schema/||; s|\.schema\.json||' | tr '\n' ' ' | xargs)
          echo "msg=chore: 同步 ${changed_files} schema 文件 from MaaFramework" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.check_status.outputs.changes_detected == 'true'
        uses: actions-js/push@master
        with:
          rebase: true
          branch: ${{ github.ref }}
          message: "${{ steps.build_msg.outputs.msg }}

            Triggered by ${{ github.sha }}

            [skip changelog]"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes detected
        if: steps.check_status.outputs.changes_detected != 'true'
        run: echo "No changes detected in JSON schema files"
